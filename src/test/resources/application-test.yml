grpc:
  server:
    port: 0

server:
  port: 0

spring:
  datasource:
    username: yusi_test
    password: yusi_test
    url: jdbc:mysql://127.0.0.1:13306/yusi_test?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: YusiTest_HikariCP
      minimum-idle: 1
      maximum-pool-size: 4
      connection-timeout: 10000
      connection-test-query: SELECT 1
    type: com.zaxxer.hikari.HikariDataSource
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 60MB
      enabled: true

redis:
  sdk:
    config:
      host: 127.0.0.1
      port: 16379
      password: ""
      pool-size: 4
      min-idle-size: 1
      idle-timeout: 10000
      connect-timeout: 3000
      retry-attempts: 1
      retry-interval: 500
      ping-interval: 0
      keep-alive: true

model:
  embedding:
    baseurl: http://localhost
    apikey: dummy
    model: dummy
    dimension: 1024
  chat:
    baseurl: http://localhost
    apikey: dummy
    model: dummy
  routing:
    default-language: zh
    default-scene: chat
    models: []
    groups: {}
    matrix: {}

milvus:
  uri: http://127.0.0.1:19530
  token:
  host: 127.0.0.1
  port: 19530
  username:
  password:

yusi:
  admin:
    userId: admin
  security:
    crypto:
      server-aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      backup-rsa-public-key-spki-base64: 
      backup-rsa-private-key-pkcs8-base64: 
  memory:
    context-window-size: 20
    mid-term-summary-interval: 3600000
    mid-term-scan-cron: "0 */30 * * * ?"
  oss:
    domain:
    region: cn-hangzhou
    bucket-name:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    url-expire-seconds: 3600
    max-file-size: 10485760
    image-folder: yusi/images/
    access-key-id:
    access-key-secret:

mcp:
  enabled: false

amap:
  key:
  base-url: https://restapi.amap.com/v3

aliyun:
  dm:
    accessKeyId:
    accessKeySecret:
    accountName:
    fromAlias: Yusi
    endpoint: dm.aliyuncs.com

logging:
  level:
    root: warn
