grpc:
  server:
    port: 9090

server:
  port: 20611
  tomcat:
    threads:
      max: 200 # 设定处理客户请求的线程的最大数目，决定了服务器可以同时响应客户请求的数,默认200
      min-spare: 50 # 初始化线程数,最小空闲线程数,默认是10
    accept-count: 10 # 等待队列长度

model:
  embedding:
    baseurl: ${EMBEDDING_MODEL_BASEURL}
    apikey: ${EMBEDDING_MODEL_APIKEY}
    model: ${EMBEDDING_MODEL_NAME}
    dimension: ${EMBEDDING_MODEL_DIMENSION:1024}
  routing:
    default-language: zh
    default-scene: chat
    strategy-channel: yusi:model:group:strategy:channel
    state-channel: yusi:model:state:channel
    instance-state-map-key: yusi:model:state:instances
    group-strategy-map-key: yusi:model:group:strategies
    failure-threshold: 3
    recovery-success-threshold: 2
    recovery-probe-interval-ms: 15000
    models:
      - id: qwen-main
        baseurl: ${CHAT_MODEL_BASEURL}
        apikey: ${CHAT_MODEL_APIKEY}
        model: ${CHAT_MODEL_NAME}
        weight: 100
        priority: 1
        languages: [zh, en, ja]
        scenes: [chat, situation-analysis, memory-extract, emotion-analysis]
    groups:
      chat-zh:
        strategy: ROUND_ROBIN
        members: [qwen-main]
      analysis-zh:
        strategy: LEAST_LATENCY
        members: [qwen-main]
      emotion-zh:
        strategy: LEAST_LATENCY
        members: [qwen-main]
      memory-zh:
        strategy: FAIL_OVER
        members: [qwen-main]
      chat-en:
        strategy: WEIGHTED_RANDOM
        members: [qwen-main]
      chat-ja:
        strategy: WEIGHTED_RANDOM
        members: [qwen-main]
    matrix:
      zh:
        chat: chat-zh
        situation-analysis: analysis-zh
        emotion-analysis: emotion-zh
        memory-extract: memory-zh
      en:
        chat: chat-en
        situation-analysis: analysis-zh
        emotion-analysis: emotion-zh
        memory-extract: memory-zh
      ja:
        chat: chat-ja
        situation-analysis: analysis-zh
        emotion-analysis: emotion-zh
        memory-extract: memory-zh

yusi:
  security:
    crypto:
      server-aes-key-base64: ${YUSI_ENCRYPTION_KEY}
      backup-rsa-public-key-spki-base64: ${YUSI_BACKUP_RSA_PUBLIC_KEY_SPKI_BASE64}
      backup-rsa-private-key-pkcs8-base64: ${YUSI_BACKUP_RSA_PRIVATE_KEY_PKCS8_BASE64}
  memory:
    # 上下文记忆窗口大小（短期记忆的消息条数）
    context-window-size: 20
    # 中期记忆总结间隔（毫秒，默认 1 小时）
    mid-term-summary-interval: 3600000
    # 中期记忆触发扫描的 Cron 表达式（默认每 30 分钟执行一次）
    mid-term-scan-cron: "0 */30 * * * ?"
  oss:
    domain: ${YUSI_OSS_DOMAIN}
    region: ${YUSI_OSS_REGION}
    bucket-name: ${YUSI_OSS_BUCKET_NAME}
    endpoint: ${YUSI_OSS_ENDPOINT}
    url-expire-seconds: ${YUSI_OSS_URL_EXPIRE_SECONDS:3600}
    max-file-size: ${YUSI_OSS_MAX_FILE_SIZE:10485760}
    image-folder: ${YUSI_OSS_IMAGE_FOLDER:yusi/images/}
    access-key-id: ${YUSI_OSS_ACCESS_KEY_ID}
    access-key-secret: ${YUSI_OSS_ACCESS_KEY_SECRET}

# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 50
        keep-alive-time: 5000
        block-queue-size: 5000
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  datasource:
    # ShardingSphere 对 Driver 自定义，实现分库分表等隐藏逻辑
    #    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # ShardingSphere 配置文件路径
    #    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
    username: root
    password: 123456
    url: jdbc:mysql://127.0.0.1:3306/yusi?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: Retail_HikariCP
      minimum-idle: 5 #最小空闲连接数量
      idle-timeout: 60000 #空闲连接存活最大时间，默认600000（10分钟）
      maximum-pool-size: 10 #连接池最大连接数，默认是10
      auto-commit: true #此属性控制从池返回的连接的默认自动提交行为,默认值：true
      max-lifetime: 120000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      connection-timeout: 30000 #数据库连接超时时间,默认30秒，即30000
      connection-test-query: SELECT 1
    type: com.zaxxer.hikari.HikariDataSource
  servlet:
    multipart:
      max-file-size: 15MB #上传文件单个大小限制
      max-request-size: 60MB #上传文件总大小限制
      enabled: true #是否开启文件上传功能，默认false
  jpa:
    show-sql: true #是否打印SQL语句，默认false
    hibernate:
      ddl-auto: none #自动更新数据库表结构，默认none，可选值none、create、create-drop、validate、update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy #数据库表和字段的命名策略，默认org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect #数据库方言，默认org.hibernate.dialect.MySQL5Dialect

#Redis 配置
redis:
  sdk:
    config:
      host: 127.0.0.1
      port: 6379
      password: ""
      pool-size: 10
      min-idle-size: 5
      idle-timeout: 30000
      connect-timeout: 5000
      retry-attempts: 3
      retry-interval: 1000
      ping-interval: 60000
      keep-alive: true

milvus:
  uri: ${MILVUS_URI}
  token: ${MILVUS_TOKEN}
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT}
  username: ${MILVUS_USERNAME}
  password: ${MILVUS_PASSWORD}

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

# MCP (Model Context Protocol) 配置
# 启用后，DiaryAssistant 将可以使用 MCP Server 提供的工具（如 web_search）
mcp:
  enabled: false # 设置为 true 启用 MCP 集成
  server:
    url: http://localhost:11611/mcp # Go MCP Server 端点 (Streamable HTTP)

# 高德地图 API 配置
amap:
  key: ${AMAP_API_KEY}
  base-url: https://restapi.amap.com/v3

# 阿里云邮件推送服务
aliyun:
  dm:
    accessKeyId: ${ALIYUN_DM_ACCESS_KEY_ID:}
    accessKeySecret: ${ALIYUN_DM_ACCESS_KEY_SECRET:}
    accountName: ${ALIYUN_DM_ACCOUNT_NAME:}
    fromAlias: ${ALIYUN_DM_FROM_ALIAS:Yusi}
    endpoint: dm.aliyuncs.com
