grpc:
  server:
    port: 9090

server:
  port: 611
  tomcat:
    threads:
      max: 200 # 设定处理客户请求的线程的最大数目，决定了服务器可以同时响应客户请求的数,默认200
      min-spare: 20 # 初始化线程数,最小空闲线程数,默认是10
    accept-count: 100 # 等待队列长度
    max-connections: 500 # 最大连接数

model:
  embedding:
    baseurl: ${EMBEDDING_MODEL_BASEURL:https://api.siliconflow.cn/v1}
    apikey: ${EMBEDDING_MODEL_APIKEY:your-siliconflow-embedding-apikey}
    model: ${EMBEDDING_MODEL_NAME:BAAI/bge-m3}
    dimension: ${EMBEDDING_MODEL_DIMENSION:1024}
  routing:
    default-language: zh
    default-scene: chat
    strategy-channel: yusi:model:group:strategy:channel
    state-channel: yusi:model:state:channel
    instance-state-map-key: yusi:model:state:instances
    group-strategy-map-key: yusi:model:group:strategies
    failure-threshold: 3
    recovery-success-threshold: 2
    recovery-probe-interval-ms: 15000
    models:
      - id: qwen
        baseurl: ${QWEN_BASEURL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        apikey: ${QWEN_APIKEY:your-qwen-apikey}
        model: ${QWEN_MODEL:qwen3.5-flash-2026-02-23}
        weight: 100
        priority: 2
        languages: [zh, en]
        scenes: [chat, situation-analysis, memory-extract, emotion-analysis, soul-match]
      - id: deepseek
        baseurl: ${DEEPSEEK_BASEURL:https://api.deepseek.com}
        apikey: ${DEEPSEEK_APIKEY:your-deepseek-apikey}
        model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
        weight: 0
        priority: 1
        languages: [zh, en]
        scenes: [chat, situation-analysis, memory-extract, emotion-analysis, soul-match]
    groups:
      chat-zh:
        strategy: FAIL_OVER
        members: [qwen, deepseek]
      analysis-zh:
        strategy: FAIL_OVER
        members: [qwen, deepseek]
      memory-zh:
        strategy: FAIL_OVER
        members: [qwen, deepseek]
      emotion-zh:
        strategy: WEIGHTED_RANDOM
        members: [qwen, deepseek]
      match-zh:
        strategy: FAIL_OVER
        members: [qwen, deepseek]
    matrix:
      zh:
        chat: 
          group: chat-zh
          temperature: 1.3
          maxTokens: 256
        situation-analysis: 
          group: analysis-zh
          temperature: 0.1
        emotion-analysis: 
          group: emotion-zh
          temperature: 0.3
          maxTokens: 32
        memory-extract: 
          group: memory-zh
        soul-match:
          group: match-zh

yusi:
  jwt:
    secret: ${YUSI_JWT_SECRET:your-jwt-secret-placeholder}
  security:
    crypto:
      server-aes-key-base64: ${YUSI_ENCRYPTION_KEY:your-server-aes-key-placeholder}
      backup-rsa-public-key-spki-base64: ${YUSI_RSA_PUBLIC_KEY:your-rsa-public-key-placeholder}
      backup-rsa-private-key-pkcs8-base64: ${YUSI_RSA_PRIVATE_KEY:your-rsa-private-key-placeholder}
  memory:
    # 上下文记忆窗口大小（短期记忆的消息条数）
    context-window-size: 20
    # 中期记忆总结间隔（毫秒，默认 1 小时）
    mid-term-summary-interval: 7200000
    # 中期记忆触发扫描的 Cron 表达式（默认每 30 分钟执行一次）
    mid-term-scan-cron: "0 */10 * * * ?"
  oss:
    domain: ${OSS_DOMAIN:oss.aseubel.cn}
    region: ${OSS_REGION:cn-guangzhou}
    bucket-name: ${OSS_BUCKET_NAME:yangaseubel}
    endpoint: ${OSS_ENDPOINT:oss-cn-guangzhou.aliyuncs.com}
    url-expire-seconds: 3600
    max-file-size: 10485760
    image-folder: yusi/images/
    access-key-id: ${OSS_ACCESS_KEY_ID:your-oss-access-key-id}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-oss-access-key-secret}


# 线程池配置
thread:
  pool:
    executor:
      config:
        core-pool-size: 20
        max-pool-size: 200
        keep-alive-time: 60
        block-queue-size: 500
        policy: CallerRunsPolicy

# 数据库配置；启动时配置数据库资源信息
spring:
  datasource:
    # ShardingSphere 对 Driver 自定义，实现分库分表等隐藏逻辑
    #    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # ShardingSphere 配置文件路径
    #    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:your-mysql-password}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/yusi?serverTimezone=UTC&characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: Retail_HikariCP
      minimum-idle: 10
      idle-timeout: 600000
      maximum-pool-size: 20
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
    type: com.zaxxer.hikari.HikariDataSource
  servlet:
    multipart:
      max-file-size: 15MB #上传文件单个大小限制
      max-request-size: 60MB #上传文件总大小限制
      enabled: true #是否开启文件上传功能，默认false
  jpa:
    show-sql: false #是否打印SQL语句，默认false
    hibernate:
      ddl-auto: none #自动更新数据库表结构，默认none，可选值none、create、create-drop、validate、update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy #数据库表和字段的命名策略，默认org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect #数据库方言，默认org.hibernate.dialect.MySQL5Dialect

#Redis 配置
redis:
  sdk:
    config:
      host: ${REDIS_SDK_CONFIG_HOST:redis}
      port: ${REDIS_SDK_CONFIG_PORT:6379}
      password: ${REDIS_SDK_CONFIG_PASSWORD:your-redis-password}
      pool-size: 10
      min-idle-size: 5
      idle-timeout: 30000
      connect-timeout: 5000
      retry-attempts: 3
      retry-interval: 1000
      ping-interval: 60000
      keep-alive: true

milvus:
  uri: ${MILVUS_URI:your-milvus-cloud-uri}
  token: ${MILVUS_TOKEN:your-milvus-cloud-token}
  host: ${MILVUS_HOST:}
  port: ${MILVUS_PORT:19530}
  username: ${MILVUS_USERNAME:your-milvus-username}
  password: ${MILVUS_PASSWORD:your-milvus-password}

# 日志
logging:
  level:
    root: info
  config: classpath:logback-spring.xml

# MCP (Model Context Protocol) 配置
# 启用后，DiaryAssistant 将可以使用 MCP Server 提供的工具（如 web_search）
mcp:
  enabled: true # 设置为 true 启用 MCP 集成
  server:
    url: http://yusi-mcp:11611/mcp # Go MCP Server 端点 (Streamable HTTP)

# 高德地图 API 配置
amap:
  key: ${AMAP_KEY:your-amap-key-placeholder}
  base-url: https://restapi.amap.com/v3

# 阿里云邮件推送服务
aliyun:
  dm:
    accessKeyId: ${ALIYUN_DM_ACCESS_KEY_ID:your-aliyun-dm-access-key-id}
    accessKeySecret: ${ALIYUN_DM_ACCESS_KEY_SECRET:your-aliyun-dm-access-key-secret}
    accountName: ${ALIYUN_DM_ACCOUNT_NAME:yusi@mail.aseubel.cn}
    fromAlias: Yusi
    endpoint: dm.aliyuncs.com
