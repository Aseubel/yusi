spring:
  config:
    name: yusi
  profiles:
    active: prod

yusi:
  memory:
    # 上下文记忆窗口大小（短期记忆的消息条数）
    context-window-size: 20
    # 中期记忆总结间隔（毫秒，默认 1 小时）
    mid-term-summary-interval: 3600000
    # 中期记忆触发扫描的 Cron 表达式（默认每 30 分钟执行一次）
    mid-term-scan-cron: "0 */30 * * * ?"
  oss:
    domain: ${OSS_DOMAIN:}
    region: ${OSS_REGION:cn-hangzhou}
    bucket-name: ${OSS_BUCKET_NAME:}
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    url-expire-seconds: ${OSS_URL_EXPIRE_SECONDS:3600}
    max-file-size: ${OSS_MAX_FILE_SIZE:52428800}
    image-folder: ${OSS_IMAGE_FOLDER:yusi/images/}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
